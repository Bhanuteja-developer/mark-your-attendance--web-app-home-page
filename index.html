<p class="font-body-sm text-body-sm text-on-surface-variant text-center px-sm">Enter your email address and we'll send you a 6-digit OTP to reset your password.</p>
</header>
<!-- Form -->
<form action="#" class="flex flex-col gap-md mt-sm" method="POST">
<!-- Email Input -->
<div class="flex flex-col gap-xs relative">
<label class="font-label-md text-label-md text-on-surface sr-only" for="email">Email Address</label>

<div class="absolute inset-y-0 left-0 pl-sm flex items-center pointer-events-none">

</div>
